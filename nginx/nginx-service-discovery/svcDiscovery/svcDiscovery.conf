# ── njs ────────────────────────────────────────────────────────────────
#js_path   "/etc/nginx/njs";
js_import svcDiscovery from svcDiscovery/svcDiscovery.js;

# ── maps ───────────────────────────────────────────────────────────────
#
# $consul_server_name:
#   For HTTPS: $ssl_server_name (SNI value).
#   For HTTP or when client sends no SNI: fall back to $host.
#
# $consul_proto:
#   "https" when the connection is TLS, "http" otherwise.

map $ssl_server_name $consul_server_name {
    ""       $host;
    default  $ssl_server_name;
}

map $https $consul_proto {
    "on"     https;
    default  http;
}

# ── upstreams ──────────────────────────────────────────────────────────
upstream svcDiscovery_collector {
    server    127.0.0.1:10080;
    keepalive 16;
}

# ─────────────────────────────────────────────────────────────────────────────
# Consul-compatible service discovery server
#
#   GET /v1/catalog/services
#   GET /v1/health/service/:name
#   GET /v1/health/services           (custom, non-standard)
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen       8500;
    server_name  svcDiscovery;

    access_log  /var/log/nginx/svcDiscovery.log;

    location = /v1/catalog/services {
        js_content  svcDiscovery.catalogServices;
    }

    location ~ ^/v1/health/service/(?<consul_service_name>[^/]+)$ {
        js_content  svcDiscovery.healthService;
    }

    location = /v1/health/services {
        js_content  svcDiscovery.allServices;
    }

    location / {
        return  404 '{"error":"unknown endpoint"}\n';
        add_header  Content-Type  application/json;
    }

    location /cleanup {
        internal;

        # ── periodic cleanup ───────────────────────────────────────────────────
        #
        # interval  — how often cleanup fires. Keep consistent with
        #             CLEANUP_INTERVAL_S in svcDiscovery.js (documentation only).
        # jitter    — spreads startup across workers; irrelevant with
        #             worker_affinity but kept for clarity.
        js_periodic svcDiscovery.cleanup interval=60s jitter=5s;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# Internal collector server
#
# Listens only on the loopback interface so it is never reachable externally.
# Receives mirror subrequests from every discoverable server and delegates
# to the njs collect() handler, which persists a JSON file per service.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen       127.0.0.1:10080;

    access_log  /var/log/nginx/svcDiscovery-collector.log;

    location / {
        allow 127.0.0.1;
        deny all;
        js_content  svcDiscovery.collect;
    }
}
