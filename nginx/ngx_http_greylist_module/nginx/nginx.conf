# nginx.conf — main configuration for the greylist module demo
# ─────────────────────────────────────────────────────────────

load_module modules/ngx_http_greylist_module.so;

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile    on;
    keepalive_timeout 65;

    # ── Greylisting zone ──────────────────────────────────────────────────────
    # One shared-memory zone holds all greylist entries and rate-limit buckets.
    greylist_zone  gl  16m  timeout=3600s;

    # ── Fingerprint definition ────────────────────────────────────────────────
    # The fingerprint is entirely user-defined — no built-in components.
    # Add one greylist_fingerprint_header line per component you want hashed.
    #
    # This example replicates the original NJS clientFingerprint() behaviour:
    #   IP address + User-Agent + Authorization header
    greylist_fingerprint_header zone=gl var=$remote_addr;
    greylist_fingerprint_header zone=gl var=$http_user_agent;
    greylist_fingerprint_header zone=gl var=$http_authorization;

    # ── Rate-limit rules ──────────────────────────────────────────────────────
    # Rules are matched in order; the first match per request is applied.
    # Pattern subject: "METHOD:scheme://host/uri[?args]"

    # POST /auth/login — 5 req/s, burst 5, greylist 120 s on excess
    greylist_rule  zone=gl
                   pattern="~*^POST:https?://[^/]+/auth/login"
                   rate=5r/s
                   burst=5
                   duration=120s;

    # GET /api/search — 30 req/min, burst 10, greylist 60 s on excess
    greylist_rule  zone=gl
                   pattern="~*^GET:https?://[^/]+/api/search"
                   rate=30r/m
                   burst=10
                   duration=60s;

    include /etc/nginx/conf.d/*.conf;
}
