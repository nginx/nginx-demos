# nginx.conf — ngx_stream_radius_module example
#
# This example shows a RADIUS-aware stream server that:
#  1. Parses incoming RADIUS packets (auth + accounting)
#  2. Logs all standard RFC 2865/2866 AVPs as NGINX variables
#  3. Routes packets based on parsed content
#  4. Loads Cisco and MikroTik vendor dictionaries
#
# Compatible with NGINX Open Source >= 1.11.5 and NGINX Plus >= R11.

# Dynamic module loading (omit for static builds)
load_module modules/ngx_stream_radius_module.so;

worker_processes auto;
error_log /var/log/nginx/error.log info;

events {
    worker_connections 1024;
}

stream {

    # Required: prevents variables_hash_bucket_size warning
    variables_hash_bucket_size 128;

    # ----------------------------------------------------------------
    # Shared log format that exposes all RADIUS variables
    # ----------------------------------------------------------------
    log_format radius_detail
        'time="$time_iso8601" '
        'src="$remote_addr:$remote_port" '
        'radius_valid="$radius_valid" '
        'code="$radius_code" '
        'code_name="$radius_code_name" '
        'id="$radius_identifier" '
        'len="$radius_length" '
        # RFC 2865 standard attributes
        'user="$radius_user_name" '
        'nas_ip="$radius_nas_ip_address" '
        'nas_port="$radius_nas_port" '
        'nas_port_type="$radius_nas_port_type" '
        'nas_id="$radius_nas_identifier" '
        'nas_port_id="$radius_nas_port_id" '
        'service_type="$radius_service_type" '
        'calling_id="$radius_calling_station_id" '
        'called_id="$radius_called_station_id" '
        'state="$radius_state" '
        'class="$radius_class" '
        'framed_ip="$radius_framed_ip_address" '
        'framed_proto="$radius_framed_protocol" '
        'session_timeout="$radius_session_timeout" '
        'idle_timeout="$radius_idle_timeout" '
        # RFC 2866 accounting attributes
        'acct_status="$radius_acct_status_type" '
        'acct_session_id="$radius_acct_session_id" '
        'acct_session_time="$radius_acct_session_time" '
        'acct_in_octets="$radius_acct_input_octets" '
        'acct_out_octets="$radius_acct_output_octets" '
        'acct_terminate="$radius_acct_terminate_cause" '
        # Upstream response (requires proxy_responses 1)
        'resp_code="$radius_response_code" '
        'resp_name="$radius_response_code_name" '
        # Response packet attributes (Access-Accept / Access-Reject)
        'resp_framed_ip="$radius_resp_framed_ip_address" '
        'resp_framed_proto="$radius_resp_framed_protocol" '
        'resp_service_type="$radius_resp_service_type" '
        'resp_session_timeout="$radius_resp_session_timeout" '
        'resp_idle_timeout="$radius_resp_idle_timeout" '
        'resp_reply_msg="$radius_resp_reply_message" '
        'resp_framed_pool="$radius_resp_framed_pool" '
        'resp_class="$radius_resp_class" '
        'resp_state="$radius_resp_state" '
        # Vendor-specific variables (require radius_dict directives above).
        # Naming: radius_vsa_<vendorname>_<attrname>
        # Both parts are lowercased with hyphens converted to underscores.
        #
        # Cisco (vendor PEN 9):
        #   ATTRIBUTE Cisco-AVPair 1 string  -> $radius_vsa_cisco_cisco_avpair
        #   ATTRIBUTE Cisco-Policy-Up 73 str -> $radius_vsa_cisco_cisco_policy_up
        'cisco_avpair="$radius_vsa_cisco_cisco_avpair" '
        'cisco_policy_up="$radius_vsa_cisco_cisco_policy_up" '
        'cisco_policy_down="$radius_vsa_cisco_cisco_policy_down" '
        # MikroTik (vendor PEN 14988):
        #   ATTRIBUTE Mikrotik-Rate-Limit 8  -> $radius_vsa_mikrotik_mikrotik_rate_limit
        'mt_rate_limit="$radius_vsa_mikrotik_mikrotik_rate_limit" '
        'mt_group="$radius_vsa_mikrotik_mikrotik_group"';

    # ----------------------------------------------------------------
    # Authentication server (UDP 1812)
    # ----------------------------------------------------------------
    server {
        listen 1812 udp;

        # Enable RADIUS packet parsing
        radius_parse      on;

        #
        # REQUIRED for access_log to work on UDP servers.
        #
        # For UDP, NGINX only writes the access_log when the session is
        # finalised.  A UDP session finalises when:
        #   (a) proxy_responses N upstream datagrams have been forwarded
        #       back to the client, OR
        #   (b) proxy_timeout expires (default 10 minutes — far too long).
        #
        # For RADIUS (one request → one reply) set proxy_responses 1 so
        # the session closes immediately after the upstream response, and
        # the access_log line is written straight away.
        #
        proxy_responses   1;

        # Shared secret for optional Message-Authenticator validation
        radius_secret     "change-me-in-production";

        # Buffer size — default 4096, RADIUS max is 4096 per RFC
        radius_buffer_size 4096;

        # Load vendor-specific dictionaries
        radius_dict       /etc/nginx/radius/dictionary.cisco;
        radius_dict       /etc/nginx/radius/dictionary.mikrotik;

        # Custom variable prefixes (optional — these are the defaults)
        radius_var_prefix        radius_attr_;
        radius_vendor_var_prefix radius_vsa_;

        access_log /var/log/nginx/radius_auth.log radius_detail;

        # Route to appropriate upstream RADIUS server based on NAS-Port-Type
        # NAS-Port-Type 15 = Ethernet, 19 = Wireless-IEEE-802.11
        proxy_pass $radius_upstream;

        # Map NAS-Port-Type to upstream group
        # (requires stream_map module, included in standard NGINX builds)
    }

    # ----------------------------------------------------------------
    # Accounting server (UDP 1813)
    # ----------------------------------------------------------------
    server {
        listen 1813 udp;

        radius_parse      on;
        radius_secret     "change-me-in-production";
        radius_dict       /etc/nginx/radius/dictionary.cisco;
        radius_dict       /etc/nginx/radius/dictionary.mikrotik;

        access_log /var/log/nginx/radius_acct.log radius_detail;

        proxy_pass 10.0.0.100:1813;
    }

    # ----------------------------------------------------------------
    # Example: map NAS-Port-Type to upstream pool
    #   0  = Async
    #   5  = Virtual
    #   15 = Ethernet
    #   19 = Wireless-IEEE-802.11
    # ----------------------------------------------------------------
    map $radius_nas_port_type $radius_upstream {
        default         "10.0.0.100:1812";   # primary RADIUS
        15              "10.0.0.101:1812";   # wired-dedicated pool
        19              "10.0.0.102:1812";   # wireless-dedicated pool
    }

    # ----------------------------------------------------------------
    # Example: restrict access to known NAS devices by IP
    # ----------------------------------------------------------------
    geo $radius_trusted_nas {
        default          0;
        10.0.0.0/24      1;
        192.168.1.0/24   1;
    }

    # ----------------------------------------------------------------
    # Upstream pools
    # ----------------------------------------------------------------
    upstream radius_primary {
        server 10.0.0.100:1812;
        server 10.0.0.101:1812 backup;
    }

    upstream radius_accounting {
        server 10.0.0.100:1813;
        server 10.0.0.101:1813 backup;
    }
}
