load_module modules/ngx_http_consul_service_discovery_module.so;

events { worker_connections 1024; }

http {

    # ── Discovery endpoint ───────────────────────────────────────────────
    server {
        listen 8080;
        server_name discovery.internal;

        location /consul/services {
            consul_service_discovery on;
            allow 10.0.0.0/8;
            allow 127.0.0.1;
            deny  all;
        }
    }

    # ── Service: explicit id, meta, TCP health check ─────────────────────
    server {
        listen      10.0.1.5:18880;
        server_name api1.example.com;

        consul_service_discoverable on;

        # Human-friendly service name
        consul_service_name "api1";

        # Explicit service ID; if omitted → auto: "<name>-<first-tag>"
        consul_service_id   "api1-v1";

        # Tags → JSON array
        consul_service_tags "v1,public,http";

        # Metadata key/value pairs (repeatable)
        consul_service_meta env  prod;
        consul_service_meta team payments;

        # Health checks (repeatable).
        # Key=value tokens; type key (tcp/http/grpc/ttl) defines the protocol.
        # address auto-discovered from listen 10.0.1.5:18880 → "10.0.1.5"
    # Use consul_service_address_override when listen is 0.0.0.0 or a container IP.
    consul_service_check name=tcp  tcp=10.0.1.5:18880  interval=10s  timeout=1s;

        location / { proxy_pass http://api1-backend; }
    }

    # ── Service: auto id, meta, HTTP health check ────────────────────────
    server {
        listen      10.0.1.6:80;
        server_name api2.example.com;

        consul_service_discoverable on;
        consul_service_name         "api2";
        # id omitted → auto-generated: "api2-v2"
        consul_service_tags         "v2,admin,nat";

        consul_service_meta env staging;

        consul_service_check name=http  http=http://10.0.1.6/health  interval=15s  timeout=2s;

        # NAT: internal port 8080, advertise :80
        consul_service_port_override 80;

        location / { proxy_pass http://api2-backend; }
    }

    # ── Service: multiple checks, no meta ────────────────────────────────
    server {
        listen 443 ssl;
        server_name api3.example.com;

        consul_service_discoverable on;
        consul_service_name         "api3";
        consul_service_id           "api3-https";
        consul_service_tags         "v3,https,grpc";

        consul_service_check name=tcp   tcp=api3.example.com:443    interval=10s  timeout=2s;
        consul_service_check name=grpc  grpc=api3.example.com:443   interval=30s  timeout=5s;

        ssl_certificate     /etc/ssl/api3.crt;
        ssl_certificate_key /etc/ssl/api3.key;

        location / { proxy_pass http://api3-backend; }
    }
}
